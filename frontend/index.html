<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f131a" />
    <meta name="description" content="LedgerFrame — local-first personal financial intelligence display." />
    <title>LedgerFrame</title>
    <script>
      // Apply the saved theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("lf_theme") || "system";
          var sys = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t === "system" ? sys : t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
