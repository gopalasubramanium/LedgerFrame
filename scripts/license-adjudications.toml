# SPDX-License-Identifier: AGPL-3.0-or-later
#
# LICENCE ADJUDICATIONS — the owner's recorded rulings on dependency-licence findings.
# release-readiness Gate A8 (RD-2). Read by `scripts/license_audit.py`.
#
# WHY THIS FILE EXISTS
# -------------------
# The audit used to end with "1 runtime finding needs a human" and exit 1 — and then a human said
# something in a chat window and everyone moved on. **Adjudication is an ARTIFACT, not a
# conversation.** A finding is cleared only when a ruling for it is written down here, with who
# decided it, when, and why.
#
# "CLEAN" MEANS **ZERO UNADJUDICATED FINDINGS** — never "zero findings". The dependency graph will
# always contain licences that need a decision; the release gate is that every one of them HAS one.
#
# STALE RULINGS ARE FINDINGS TOO. The audit fails if a ruling's package is gone, or if its licence no
# longer matches what the package actually ships. A rubber stamp that outlives the thing it stamped is
# worse than no stamp: it looks like diligence. (Mutate `licence` below and the audit goes red — there
# is a test that proves exactly that.)
#
# FORMAT: TOML, not YAML — `tomllib` is in the standard library, so recording a decision does not cost
# the project a new dependency (and an ADR) to parse it.
#
# ⚖ These are OPERATIONAL ALIGNMENT decisions by the owner. They are **not legal counsel.** The
#   runtime MPL-2.0 ruling below is flagged for optional counsel confirmation alongside the CLA.

# =====================================================================================
# RULINGS — one per flagged package.
#   package / ecosystem / scope  → what it matches
#   licence                      → what the package must STILL be, or the ruling is stale
#   versions                     → "*" = any; python accepts a PEP 440 specifier (e.g. ">=2024")
#   ruling                       → ACCEPT | REJECT      (REJECT always blocks)
# =====================================================================================

[[ruling]]
package = "certifi"
ecosystem = "python"
scope = "runtime"
licence = "Mozilla Public License 2.0 (MPL 2.0)"
versions = "*"
ruling = "ACCEPT"
decided_by = "owner"
date = "2026-07-14"
rationale = """
The only RUNTIME finding, and the only one that touches what a user actually receives.

ACCEPTED: certifi is an UNMODIFIED dependency. MPL-2.0 is FILE-LEVEL weak copyleft — its obligations
attach to the MPL-licensed files themselves, not to the work that merely uses them — and §3.3 grants
explicit compatibility with GPL-family Secondary Licences, which is the family we ship under
(AGPL-3.0-or-later). It is not vendored, and a SOURCE release does not redistribute it: the user's own
package manager fetches it.

Operational alignment decision, NOT legal counsel. Flagged for optional counsel confirmation alongside
the CLA (RD-2).
"""

