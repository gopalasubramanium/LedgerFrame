"""

# =====================================================================================
# PLATFORM-CONDITIONAL, UNVERIFIABLE-LOCAL
#
# Packages npm DECLARES (as optional per-platform binaries and optional peers) but did NOT install on
# this machine. They are not present, not built, and not shipped from here — but they are also not
# nothing, so they are neither dropped (a lie) nor lumped in with the real findings (which would bury
# the one that matters under 70 that do not).
#
# `upstream_licence` was **read from the npm registry**, not assumed — the whole reason this category
# is called "unverifiable-LOCAL" is that the manifests are absent locally, and guessing at them would
# be precisely the fabrication this project refuses.
#
# The audit fails if a NEW family appears here without a ruling.
# =====================================================================================

[[platform_family]]
family = "@esbuild/*"
upstream_licence = "MIT"
ruling = "ACCEPT"
decided_by = "owner"
date = "2026-07-14"
rationale = "Per-platform build binaries (25 declared). MIT. Not installed here; not shipped."

